# 容器环境专用配置。
# 该文件只在 SPRING_PROFILES_ACTIVE=docker 时生效，不影响本地直接运行 application.properties。

# 后端容器仍监听 8081，compose 会把它映射到宿主机的 API_PORT。
server.port=8081

# MySQL 连接地址。
# 在 Docker Compose 网络中，mysql 是数据库服务名；容器内不要使用 localhost。
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:techblog}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis 连接地址。
# redis 是 compose 中的服务名，端口默认 6379。
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT 配置仍然从环境变量读取，避免把真实密钥写进镜像。
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
